<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-TIEMPO | Fontana Designs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(25, 25, 25, 0.7);
            --accent: #c9a86a;
            --accent-glow: rgba(201, 168, 106, 0.3);
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%);
        }

        /* --- UI COMPONENTS --- */
        .container { width: 100%; max-width: 450px; padding: 40px 20px; text-align: center; }
        
        .logo-area { margin-bottom: 50px; }
        .logo-area h1 { font-weight: 900; letter-spacing: 8px; font-size: 1.5rem; color: var(--accent); }
        .logo-area span { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: #555; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%;
            transition: all 0.5s ease;
        }

        /* --- CLIENT VIEW --- */
        .big-number { 
            font-size: 9rem; 
            font-weight: 900; 
            line-height: 1; 
            background: linear-gradient(180deg, var(--accent) 0%, #8a6d3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
            filter: drop-shadow(0 10px 20px var(--accent-glow));
        }

        .status-msg { font-size: 1.1rem; font-weight: 300; color: #aaa; margin-bottom: 10px; }
        .highlight { color: var(--accent); font-weight: 700; }

        /* --- ADMIN VIEW --- */
        .admin-list { text-align: left; margin-top: 20px; }
        .client-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--glass); border-radius: 20px;
            margin-bottom: 15px; border: 1px solid var(--border);
        }
        .client-row h4 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
        .client-row span { font-size: 0.7rem; color: #666; }

        /* --- BUTTONS & INPUTS --- */
        input {
            width: 100%; background: var(--glass); border: 1px solid var(--border);
            padding: 18px; border-radius: 15px; color: white; text-align: center;
            font-size: 1rem; margin-bottom: 20px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .btn-gold { background: var(--accent); color: black; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--accent-glow); }
        .btn-call { padding: 10px 20px; width: auto; font-size: 0.7rem; }

        .hidden { display: none; }
        
        .footer-info { margin-top: auto; padding: 40px; font-size: 0.7rem; color: #333; letter-spacing: 2px; }

    </style>
</head>
<body>

    <div class="container">
       <div class="logo-area">
    <!-- Al tocar 5 veces el texto D-TIEMPO se activa el acceso -->
    <h1 onclick="handleLogoClick()" style="cursor: default; user-select: none;">D-TIEMPO</h1>
    <span>by Fontana Designs</span>
</div>

        <!-- VISTA 1: REGISTRO CLIENTE -->
        <div id="view-registration" class="glass-card">
            <p class="status-msg">Bienvenido a la <span class="highlight">Fila Virtual</span></p>
            <h3 style="margin-bottom: 30px; font-weight: 300;">Ingresá tu nombre</h3>
            <input type="text" id="input-name" placeholder="Escribí aquí...">
            <button class="btn btn-gold" onclick="joinQueue()">Obtener mi lugar</button>
        </div>

        <!-- VISTA 2: ESTADO CLIENTE -->
        <div id="view-status" class="glass-card hidden">
            <p id="label-top" class="status-msg">Tu lugar en la fila</p>
            <div id="display-number" class="big-number">#--</div>
            <p id="label-bottom" class="status-msg">Faltan <span class="highlight" id="count-before">--</span> personas</p>
            <div style="margin-top: 30px; font-size: 0.7rem; color: #555; line-height: 1.5;">
                <i class="fas fa-mobile-alt"></i><br>Te avisaremos cuando sea tu turno.<br>Podés salir de la app, te enviaremos un WhatsApp.
            </div>
        </div>

        <!-- VISTA 3: PANEL ADMIN (BARBERO) -->
        <div id="view-admin" class="glass-card hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: var(--accent);">CONTROL DE FILA</h3>
                <span id="admin-total" style="font-size: 0.8rem; background: var(--accent); color: black; padding: 2px 8px; border-radius: 5px; font-weight: 800;">0</span>
            </div>
            <div id="admin-list" class="admin-list">
                <!-- Los clientes aparecen acá -->
            </div>
        </div>
    </div>

    <div class="footer-info">FONTANA DESIGNS © 2026</div>
