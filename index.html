<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-TIEMPO | Fontana Designs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(25, 25, 25, 0.7);
            --accent: #c9a86a;
            --accent-glow: rgba(201, 168, 106, 0.3);
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%);
        }

        /* --- UI COMPONENTS --- */
        .container { width: 100%; max-width: 450px; padding: 40px 20px; text-align: center; }
        
        .logo-area { margin-bottom: 50px; }
        .logo-area h1 { font-weight: 900; letter-spacing: 8px; font-size: 1.5rem; color: var(--accent); }
        .logo-area span { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: #555; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%;
            transition: all 0.5s ease;
        }

        /* --- CLIENT VIEW --- */
        .big-number { 
            font-size: 9rem; 
            font-weight: 900; 
            line-height: 1; 
            background: linear-gradient(180deg, var(--accent) 0%, #8a6d3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
            filter: drop-shadow(0 10px 20px var(--accent-glow));
        }

        .status-msg { font-size: 1.1rem; font-weight: 300; color: #aaa; margin-bottom: 10px; }
        .highlight { color: var(--accent); font-weight: 700; }

        /* --- ADMIN VIEW --- */
        .admin-list { text-align: left; margin-top: 20px; }
        .client-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--glass); border-radius: 20px;
            margin-bottom: 15px; border: 1px solid var(--border);
        }
        .client-row h4 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
        .client-row span { font-size: 0.7rem; color: #666; }

        /* --- BUTTONS & INPUTS --- */
        input {
            width: 100%; background: var(--glass); border: 1px solid var(--border);
            padding: 18px; border-radius: 15px; color: white; text-align: center;
            font-size: 1rem; margin-bottom: 20px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .btn-gold { background: var(--accent); color: black; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--accent-glow); }
        .btn-call { padding: 10px 20px; width: auto; font-size: 0.7rem; }

        ..hidden { 
    display: none !important; 
 }
        
        .footer-info { margin-top: auto; padding: 40px; font-size: 0.7rem; color: #333; letter-spacing: 2px; }

    </style>
</head>
<body>

    <div class="container">
       <div class="logo-area">
    <!-- Al tocar 5 veces el texto D-TIEMPO se activa el acceso -->
    <h1 onclick="handleLogoClick()" style="cursor: default; user-select: none;">D-TIEMPO</h1>
    <span>by Fontana Designs</span>
</div>

        <!-- VISTA 1: REGISTRO CLIENTE -->
        <div id="view-registration" class="glass-card">
            <p class="status-msg">Bienvenido a la <span class="highlight">Fila Virtual</span></p>
            <h3 style="margin-bottom: 30px; font-weight: 300;">Ingresá tu nombre</h3>
            <input type="text" id="input-name" placeholder="Escribí aquí...">
            <button class="btn btn-gold" onclick="joinQueue()">Obtener mi lugar</button>
        </div>

        <!-- VISTA 2: ESTADO CLIENTE -->
        <div id="view-status" class="glass-card hidden">
            <p id="label-top" class="status-msg">Tu lugar en la fila</p>
            <div id="display-number" class="big-number">#--</div>
            <p id="label-bottom" class="status-msg">Faltan <span class="highlight" id="count-before">--</span> personas</p>
            <div style="margin-top: 30px; font-size: 0.7rem; color: #555; line-height: 1.5;">
                <i class="fas fa-mobile-alt"></i><br>Te avisaremos cuando sea tu turno.<br>Podés salir de la app, te enviaremos un WhatsApp.
            </div>
        </div>

        <!-- VISTA 3: PANEL ADMIN (BARBERO) -->
        <div id="view-admin" class="glass-card hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: var(--accent);">CONTROL DE FILA</h3>
                <span id="admin-total" style="font-size: 0.8rem; background: var(--accent); color: black; padding: 2px 8px; border-radius: 5px; font-weight: 800;">0</span>
            </div>
            <div id="admin-list" class="admin-list">
                <!-- Los clientes aparecen acá -->
            </div>
        </div>
    </div>

    <div class="footer-info">FONTANA DESIGNS © 2026</div>

    <!-- Botón casi invisible para activar modo Admin -->
    <div class="admin-trigger" onclick="toggleAdmin()"></div>

    <script>
        // CONFIGURACIÓN SUPABASE
        // 1. CONFIGURACIÓN SUPABASE
const SUPABASE_URL = "https://rbxfnjvavvlttqansdvh.supabase.co"; // <-- Asegurate de poner tu URL
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJieGZuanZhdnZsdHRxYW5zZHZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDE2NTMsImV4cCI6MjA4ODgxNzY1M30.a-XFDFCPu3vpQGx_xfIHYdurNPJNVkNZylrzaIcHv84"; // <-- Asegurate de poner tu KEY larga
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let myId = null;
let isAdmin = false;
let logoClicks = 0;
let logoTimer;

// 2. SEGURIDAD: Detectar si entra por URL con ?access=pro
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('access') === 'pro') {
    setTimeout(() => { askAdminPassword(); }, 500);
}

// 3. SEGURIDAD: Función de los 5 clics en el logo
function handleLogoClick() {
    logoClicks++;
    clearTimeout(logoTimer);
    logoTimer = setTimeout(() => { logoClicks = 0; }, 2000);
    if(logoClicks === 5) {
        askAdminPassword();
        logoClicks = 0;
    }
}

function askAdminPassword() {
    const pass = prompt("Acceso de Seguridad. Ingrese Clave:");
    if(pass === "feli123") { // <-- Tu contraseña
        enableAdminView();
    } else if (pass !== null) {
        alert("Clave incorrecta.");
    }
}

// 4. CAMBIO DE VISTA (Esta es la que no encontrabas, ahora es más robusta)
function switchView(viewId) {
    console.log("Cambiando a vista:", viewId);
    
    // Escondemos todas las tarjetas usando la clase hidden y display none
    const cards = document.querySelectorAll('.glass-card');
    cards.forEach(card => {
        card.classList.add('hidden');
        card.style.display = 'none';
    });

    // Mostramos la que pedimos
    const target = document.getElementById(viewId);
    if(target) {
        target.classList.remove('hidden');
        target.style.display = 'block';
    }
}

function enableAdminView() {
    isAdmin = true;
    switchView('view-admin');
    updateAdminView();
}

// 5. LÓGICA DE CLIENTE
async function joinQueue() {
    const name = document.getElementById('input-name').value;
    if(!name) return alert("Por favor, ingresá tu nombre");

    const { data, error } = await _supabase
        .from('fila_virtual')
        .insert([{ nombre_cliente: name, sucursal_id: 'S1', estado: 'esperando' }])
        .select();

    if (data) {
        myId = data[0].id;
        switchView('view-status');
        updateClientView();
    }
}

async function updateClientView() {
    if(!myId || isAdmin) return;

    const { data } = await _supabase
        .from('fila_virtual')
        .select('id')
        .eq('estado', 'esperando')
        .order('created_at', { ascending: true });

    const index = data.findIndex(i => i.id === myId);
    
    if(index === -1) {
        document.getElementById('display-number').innerText = "✓";
        document.getElementById('label-top').innerText = "¡ES TU TURNO!";
        document.getElementById('label-bottom').innerHTML = "Entrá al local <span class='highlight'>ahora</span>";
        new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
    } else {
        document.getElementById('display-number').innerText = "#" + (index + 1);
        document.getElementById('count-before').innerText = index;
    }
}

// 6. LÓGICA DE ADMIN (BARBERO)
async function updateAdminView() {
    if(!isAdmin) return;
    
    const { data } = await _supabase
        .from('fila_virtual')
        .select('*')
        .eq('estado', 'esperando')
        .order('created_at', { ascending: true });

    document.getElementById('admin-total').innerText = data ? data.length : 0;
    const list = document.getElementById('admin-list');
    
    if(!data || data.length === 0) {
        list.innerHTML = "<p style='text-align:center; color:#444; margin-top:20px;'>Fila vacía</p>";
        return;
    }

    list.innerHTML = data.map((c, idx) => `
        <div class="client-row">
            <div>
                <h4>${c.nombre_cliente}</h4>
                <span>Espera: ${Math.floor((new Date() - new Date(c.created_at))/60000)}m</span>
            </div>
            <button class="btn btn-gold btn-call" onclick="callNext('${c.id}')">
                ${idx === 0 ? 'LLAMAR' : 'SALTAR'}
            </button>
        </div>
    `).join('');
}

async function callNext(id) {
    await _supabase.from('fila_virtual').update({ estado: 'atendido' }).eq('id', id);
}

// 7. REALTIME (EL MOTOR)
_supabase.channel('db-changes').on('postgres_changes', { event: '*', table: 'fila_virtual' }, () => {
    if(isAdmin) updateAdminView();
    else updateClientView();
}).subscribe();
            <script>
</body>
</html>
