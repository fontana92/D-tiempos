<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-TIEMPO | Fontana Designs</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #050505; --card-bg: rgba(25, 25, 25, 0.95); --accent: #c9a86a; --text: #ffffff; --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%); }
        
        .hidden { display: none !important; }

        .container { width: 100%; max-width: 400px; padding: 40px 20px; text-align: center; }
        .logo-area { margin-bottom: 50px; cursor: pointer; z-index: 1000; }
        .logo-area h1 { font-weight: 900; letter-spacing: 8px; font-size: 1.8rem; color: var(--accent); user-select: none; }
        .logo-area span { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: #555; }

        .glass-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 30px; padding: 40px 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 100%; margin-top: 20px; }
        .big-number { font-size: 8rem; font-weight: 900; color: var(--accent); margin: 20px 0; line-height: 1; }
        
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 18px; border-radius: 15px; color: white; text-align: center; font-size: 1.1rem; margin-bottom: 20px; outline: none; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; background: var(--accent); color: black; }
        
        .client-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); text-align: left; }
        .btn-call { width: auto; padding: 10px 15px; font-size: 0.7rem; box-shadow: 0 5px 15px rgba(201, 168, 106, 0.2); }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area" onclick="handleLogoClick()">
            <h1>D-TIEMPO</h1>
            <span>by Fontana Designs</span>
        </div>

        <!-- 1. REGISTRO -->
        <div id="view-registration" class="glass-card">
            <h3 style="margin-bottom: 25px; font-weight: 400;">Ingresá tu nombre</h3>
            <input type="text" id="input-name" placeholder="Tu nombre...">
            <button class="btn" onclick="joinQueue()">Obtener mi lugar</button>
        </div>

        <!-- 2. ESTADO CLIENTE -->
        <div id="view-status" class="glass-card hidden">
            <p style="color: #888;">Tu lugar en la fila</p>
            <div id="display-number" class="big-number">#--</div>
            <p id="label-bottom">Faltan <span id="count-before" style="color: var(--accent); font-weight: bold;">--</span> personas</p>
            <button class="btn" style="margin-top: 20px; background: transparent; color: #555; border: 1px solid #333; font-size: 0.7rem; padding: 10px;" onclick="cancelMyTurn()">Cancelar mi lugar</button>
        </div>

        <!-- 3. PANEL ADMIN -->
        <div id="view-admin" class="glass-card hidden">
            <h3 style="color: var(--accent); margin-bottom: 20px; letter-spacing: 2px;">PANEL DE CONTROL</h3>
            <div id="admin-list">
                <p style="color: #444;">Cargando fila...</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rbxfnjvavvlttqansdvh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJieGZuanZhdnZsdHRxYW5zZHZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDE2NTMsImV4cCI6MjA4ODgxNzY1M30.a-XFDFCPu3vpQGx_xfIHYdurNPJNVkNZylrzaIcHv84";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myId = null;
        let isAdmin = false;
        let clicks = 0;

        // --- FUNCION PARA CAMBIAR PANTALLA ---
        function changeScreen(screenId) {
            document.getElementById('view-registration').classList.add('hidden');
            document.getElementById('view-status').classList.add('hidden');
            document.getElementById('view-admin').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        // --- RECUPERAR TURNO SI EXISTE ---
        async function recoverTurn() {
            const savedId = localStorage.getItem('dtiempo_id');
            if (savedId) {
                const { data } = await _supabase.from('fila_virtual').select('*').eq('id', savedId).single();
                if (data && data.estado === 'esperando') {
                    myId = data.id;
                    changeScreen('view-status');
                    updateClient();
                } else {
                    localStorage.removeItem('dtiempo_id');
                }
            }
        }

        // --- SEGURIDAD (5 TOQUES) ---
        function handleLogoClick() {
            clicks++;
            if (clicks === 5) {
                const pass = prompt("Acceso Administrador:");
                if (pass === "feli123") {
                    isAdmin = true;
                    localStorage.removeItem('dtiempo_id'); // El admin no necesita sesion de cliente
                    changeScreen('view-admin');
                    updateAdmin();
                }
                clicks = 0;
            }
            setTimeout(() => { clicks = 0; }, 3000);
        }

        // --- LÓGICA CLIENTE ---
        async function joinQueue() {
            const name = document.getElementById('input-name').value.trim();
            if (!name) return alert("Escribí tu nombre");

            const { data, error } = await _supabase
                .from('fila_virtual')
                .insert([{ nombre_cliente: name, sucursal_id: 'S1', estado: 'esperando' }])
                .select();

            if (data) {
                myId = data[0].id;
                localStorage.setItem('dtiempo_id', myId); // GUARDAR EN MEMORIA
                changeScreen('view-status');
                updateClient();
            }
        }

        async function updateClient() {
            if (!myId || isAdmin) return;
            const { data } = await _supabase.from('fila_virtual').select('id').eq('estado', 'esperando').order('created_at', { ascending: true });
            
            const index = data.findIndex(i => i.id === myId);
            
            if (index === -1) {
                document.getElementById('display-number').innerText = "✓";
                document.getElementById('label-bottom').innerText = "¡Es tu turno! Entrá.";
                localStorage.removeItem('dtiempo_id'); // LIMPIAR MEMORIA AL TERMINAR
                new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            } else {
                document.getElementById('display-number').innerText = "#" + (index + 1);
                document.getElementById('count-before').innerText = index;
            }
        }

        async function cancelMyTurn() {
            if (confirm("¿Querés salir de la fila?")) {
                await _supabase.from('fila_virtual').update({ estado: 'cancelado' }).eq('id', myId);
                localStorage.removeItem('dtiempo_id');
                location.reload();
            }
        }

        // --- LÓGICA ADMIN ---
        async function updateAdmin() {
            if (!isAdmin) return;
            const { data } = await _supabase.from('fila_virtual').select('*').eq('estado', 'esperando').order('created_at', { ascending: true });
            const list = document.getElementById('admin-list');
            
            if (!data || data.length === 0) {
                list.innerHTML = "<p style='color:#444; margin-top:20px;'>Fila vacía</p>";
                return;
            }

            list.innerHTML = data.map((c, i) => `
                <div class="client-row">
                    <div>
                        <b>${c.nombre_cliente}</b><br>
                        <span style="font-size:0.6rem; color:#555">Espera: ${Math.floor((new Date() - new Date(c.created_at))/60000)}m</span>
                    </div>
                    <button class="btn btn-call" onclick="callNext('${c.id}')">LLAMAR</button>
                </div>
            `).join('');
        }

        async function callNext(id) {
            await _supabase.from('fila_virtual').update({ estado: 'atendido' }).eq('id', id);
        }

        // --- INICIALIZACIÓN ---
        recoverTurn();

        _supabase.channel('cambios').on('postgres_changes', { event: '*', table: 'fila_virtual' }, () => {
            if (isAdmin) updateAdmin();
            else updateClient();
        }).subscribe();

    </script>
</body>
</html>
