<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-TIEMPO | Fontana Designs</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #050505; --card-bg: rgba(25, 25, 25, 0.95); --accent: #c9a86a; --text: #ffffff; --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%); overflow-x: hidden; }
        
        .hidden { display: none !important; }

        .container { width: 100%; max-width: 400px; padding: 40px 20px; text-align: center; }
        
        /* LOGO: Area de clic reforzada */
        .logo-area { margin-bottom: 50px; cursor: pointer; position: relative; z-index: 9999; padding: 10px; user-select: none; }
        .logo-area h1 { font-weight: 900; letter-spacing: 8px; font-size: 1.8rem; color: var(--accent); pointer-events: none; }
        .logo-area span { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: #555; pointer-events: none; }

        .glass-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 30px; padding: 40px 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 100%; margin-top: 10px; }
        .big-number { font-size: 8rem; font-weight: 900; color: var(--accent); margin: 20px 0; line-height: 1; }
        
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 18px; border-radius: 15px; color: white; text-align: center; font-size: 1.1rem; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; background: var(--accent); color: black; }
        
        .client-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); text-align: left; }
        .btn-call { width: auto; padding: 10px 15px; font-size: 0.7rem; }
        
        .notif-banner { background: var(--accent); color: black; font-size: 0.7rem; padding: 12px; border-radius: 15px; margin-bottom: 15px; font-weight: 800; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <!-- LOGO CON CLIC AREA -->
        <div class="logo-area" onclick="handleLogoClick()">
            <h1>D-TIEMPO</h1>
            <span>by Fontana Designs</span>
        </div>

        <div id="notif-request" class="notif-banner hidden" onclick="requestNotifPermission()">
            🔔 TOCÁ ACÁ PARA RECIBIR EL AVISO EN TU CELU
        </div>

        <!-- 1. REGISTRO -->
        <div id="view-registration" class="glass-card">
            <h3 style="margin-bottom: 25px; font-weight: 400;">Tu lugar en la fila</h3>
            <input type="text" id="input-name" placeholder="Tu nombre...">
            <button class="btn" onclick="joinQueue()">Obtener mi lugar</button>
        </div>

        <!-- 2. ESTADO CLIENTE -->
        <div id="view-status" class="glass-card hidden">
            <p style="color: #888;">Tu lugar actual</p>
            <div id="display-number" class="big-number">#--</div>
            <p id="label-bottom">Cargando...</p>
        </div>

        <!-- 3. PANEL ADMIN -->
        <div id="view-admin" class="glass-card hidden">
            <h3 style="color: var(--accent); margin-bottom: 20px;">CONTROL DE FILA</h3>
            <div id="admin-list"></div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN ---
        const SUPABASE_URL = "https://rbxfnjvavvlttqansdvh.supabase.co
";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJieGZuanZhdnZsdHRxYW5zZHZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDE2NTMsImV4cCI6MjA4ODgxNzY1M30.a-XFDFCPu3vpQGx_xfIHYdurNPJNVkNZylrzaIcHv84";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myId = null;
        let isAdmin = false;
        let clicks = 0;
        let logoTimer;

        // --- 2. SEGURIDAD (5 TOQUES) - REFORZADO ---
        function handleLogoClick() {
            clicks++;
            console.log("Clics en logo:", clicks);
            
            clearTimeout(logoTimer);
            logoTimer = setTimeout(() => { 
                clicks = 0; 
                console.log("Contador reiniciado");
            }, 3000); // 3 segundos para hacer los 5 toques

            if (clicks === 5) {
                const pass = prompt("Clave de Administrador:");
                if (pass === "feli123") {
                    isAdmin = true;
                    localStorage.removeItem('dtiempo_id');
                    changeScreen('view-admin');
                    updateAdmin();
                }
                clicks = 0;
            }
        }

        // --- 3. NAVEGACIÓN ---
        function changeScreen(screenId) {
            document.getElementById('view-registration').classList.add('hidden');
            document.getElementById('view-status').classList.add('hidden');
            document.getElementById('view-admin').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        // --- 4. NOTIFICACIONES ---
        function requestNotifPermission() {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") document.getElementById('notif-request').classList.add('hidden');
            });
        }

        if (Notification.permission !== "granted") {
            document.getElementById('notif-request').classList.remove('hidden');
        }

        function notifyUser() {
            if (Notification.permission === "granted") {
                new Notification("¡D-TIEMPO!", { 
                    body: "Es tu turno en la barbería. ¡Te estamos esperando!",
                    icon: 'https://i.postimg.cc/s2dsJwRZ/IMG-20260122-WA0001.jpg'
                });
            }
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }

        // --- 5. LÓGICA CLIENTE ---
        async function joinQueue() {
            const name = document.getElementById('input-name').value.trim();
            if (!name) return alert("Por favor escribí tu nombre");

            const { data } = await _supabase.from('fila_virtual').insert([{ nombre_cliente: name, estado: 'esperando' }]).select();
            if (data) {
                myId = data[0].id;
                localStorage.setItem('dtiempo_id', myId);
                changeScreen('view-status');
                updateClient();
            }
        }

        async function updateClient() {
            if (!myId || isAdmin) return;
            const { data } = await _supabase.from('fila_virtual').select('id').eq('estado', 'esperando').order('created_at', { ascending: true });
            const index = data.findIndex(i => i.id === myId);
            
            if (index === -1) {
                document.getElementById('display-number').innerText = "✓";
                document.getElementById('label-bottom').innerText = "¡PASÁ, ES TU TURNO!";
                notifyUser();
                localStorage.removeItem('dtiempo_id');
                myId = null;
            } else {
                document.getElementById('display-number').innerText = "#" + (index + 1);
                document.getElementById('label-bottom').innerHTML = `Faltan <span style="color:var(--accent); font-weight:800;">${index}</span> personas`;
            }
        }

        // --- 6. LÓGICA ADMIN ---
        async function updateAdmin() {
            if (!isAdmin) return;
            const { data } = await _supabase.from('fila_virtual').select('*').eq('estado', 'esperando').order('created_at', { ascending: true });
            const list = document.getElementById('admin-list');
            if (!data || data.length === 0) { list.innerHTML = "<p style='color:#444'>Fila vacía</p>"; return; }

            list.innerHTML = data.map((c, i) => `
                <div class="client-row">
                    <div><b>${c.nombre_cliente}</b></div>
                    <button class="btn btn-call" onclick="callNext('${c.id}')">LLAMAR</button>
                </div>
            `).join('');
        }

        async function callNext(id) {
            await _supabase.from('fila_virtual').update({ estado: 'atendido' }).eq('id', id);
        }

        // --- 7. SESIÓN Y REALTIME ---
        const savedId = localStorage.getItem('dtiempo_id');
        if (savedId) {
            myId = parseInt(savedId);
            changeScreen('view-status');
            updateClient();
        }

        _supabase.channel('cambios').on('postgres_changes', { event: '*', table: 'fila_virtual' }, () => {
            if (isAdmin) updateAdmin(); else updateClient();
        }).subscribe();
    </script>
</body>
</html>
